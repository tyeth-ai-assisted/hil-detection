[pytest]
# ──────────────────────────────────────────────────────────────────────────────
# HIL test suite — Pico W on rpi-displays (192.168.1.234)
# ──────────────────────────────────────────────────────────────────────────────

# Default test paths
testpaths = tests

# Registered custom markers (avoids PytestUnknownMarkWarning)
markers =
    circuitpython: Tests that target CircuitPython firmware on the Pico W
    wippersnapper: Tests that target WipperSnapper firmware on the Pico W
    micropython:   Tests that target MicroPython firmware on the Pico W

# Always show short summary for failures and errors
addopts =
    -v
    --tb=short
    --strict-markers

# Timeout (requires pytest-timeout):
# timeout = 300

# Minimum pytest version
minversion = 7.0
